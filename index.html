<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src https://cdnjs.cloudflare.com; img-src 'self' data:;" />
  <title>Polymath IDE — Full Stack Multi-Agent AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
    }

    /* ---- Split-screen layout ---- */
    #editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #333;
    }

    #editor-header {
      background: #252526;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
      border-bottom: 1px solid #333;
    }

    #monaco-container {
      flex: 1;
      width: 100%;
    }

    /* ---- Chat pane ---- */
    #chat-pane {
      width: 400px;
      display: flex;
      flex-direction: column;
      background: #252526;
    }

    #chat-header {
      background: #2d2d2d;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
      border-bottom: 1px solid #333;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .agent-message {
      background: #1e1e1e;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 10px 12px;
    }

    .agent-name {
      font-size: 12px;
      font-weight: 700;
      color: #569cd6;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .agent-response {
      font-size: 13px;
      line-height: 1.5;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user-message {
      background: #094771;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      align-self: flex-end;
      max-width: 90%;
    }

    .error-message {
      background: #5a1d1d;
      border: 1px solid #f48771;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: #f48771;
    }

    /* ---- Chat input area ---- */
    #chat-input-area {
      padding: 12px;
      border-top: 1px solid #333;
      display: flex;
      gap: 8px;
      background: #2d2d2d;
    }

    #chat-input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 13px;
      color: #d4d4d4;
      resize: none;
      outline: none;
      font-family: inherit;
    }

    #chat-input:focus {
      border-color: #569cd6;
    }

    #send-btn {
      background: #0e639c;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    #send-btn:hover:not(:disabled) {
      background: #1177bb;
    }

    #send-btn:disabled {
      background: #3c3c3c;
      color: #888;
      cursor: not-allowed;
    }

    .loading-indicator {
      font-size: 12px;
      color: #888;
      text-align: center;
      padding: 4px;
    }
  </style>
</head>
<body>

  <!-- Left pane: Monaco Editor -->
  <div id="editor-pane">
    <div id="editor-header">📝 Code Editor</div>
    <div id="monaco-container"></div>
  </div>

  <!-- Right pane: Chat interface -->
  <div id="chat-pane">
    <div id="chat-header">🤖 AI Agents Chat</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea
        id="chat-input"
        placeholder="Ask the AI agents about your code..."
        rows="3"
      ></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Monaco Editor via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.47.0/min/vs/loader.min.js" crossorigin="anonymous"></script>

  <script>
    // -----------------------------------------------------------------------
    // Monaco Editor initialisation
    // -----------------------------------------------------------------------
    let monacoEditor = null;

    require.config({
      paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.47.0/min/vs' }
    });

    require(['vs/editor/editor.main'], function () {
      monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
        value: '// Start coding here\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}',
        language: 'javascript',
        theme: 'vs-dark',
        automaticLayout: true,
        fontSize: 14,
        minimap: { enabled: false }
      });
    });

    // -----------------------------------------------------------------------
    // Chat interface
    // -----------------------------------------------------------------------
    const chatMessages = document.getElementById('chat-messages');
    const chatInput    = document.getElementById('chat-input');
    const sendBtn      = document.getElementById('send-btn');

    function appendMessage(element) {
      chatMessages.appendChild(element);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function createUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'user-message';
      div.textContent = text;
      return div;
    }

    function createAgentMessage(agentName, responseText) {
      const wrapper  = document.createElement('div');
      wrapper.className = 'agent-message';

      const nameEl  = document.createElement('div');
      nameEl.className = 'agent-name';
      nameEl.textContent = agentName;

      const respEl  = document.createElement('div');
      respEl.className = 'agent-response';
      // Use textContent (not innerHTML) to prevent XSS
      respEl.textContent = responseText;

      wrapper.appendChild(nameEl);
      wrapper.appendChild(respEl);
      return wrapper;
    }

    function createErrorMessage(text) {
      const div = document.createElement('div');
      div.className = 'error-message';
      div.textContent = text;
      return div;
    }

    async function handleSend() {
      const prompt = chatInput.value.trim();
      if (!prompt) return;

      const currentCode = monacoEditor
        ? monacoEditor.getValue()
        : '';

      // Display user message
      appendMessage(createUserMessage(prompt));
      chatInput.value = '';

      // Show loading state
      sendBtn.disabled = true;
      const loadingEl = document.createElement('div');
      loadingEl.className = 'loading-indicator';
      loadingEl.textContent = 'Agents are thinking\u2026';
      appendMessage(loadingEl);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, current_code: currentCode })
        });

        chatMessages.removeChild(loadingEl);

        if (!res.ok) {
          const errData = await res.json().catch(() => ({ error: 'Unknown error' }));
          appendMessage(createErrorMessage('Error: ' + (errData.error || res.statusText)));
          return;
        }

        const data = await res.json();

        if (!data.agents || !Array.isArray(data.agents)) {
          appendMessage(createErrorMessage('Unexpected response format from server.'));
          return;
        }

        // Render each agent response — AC-008, AC-011
        data.agents.forEach(function (agent) {
          appendMessage(createAgentMessage(agent.agent_name, agent.response));
        });

      } catch (err) {
        chatMessages.removeChild(loadingEl);
        appendMessage(createErrorMessage('Network error: ' + err.message));
      } finally {
        sendBtn.disabled = false;
      }
    }

    // Send on button click
    sendBtn.addEventListener('click', handleSend);

    // Send on Ctrl+Enter / Cmd+Enter
    chatInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        handleSend();
      }
    });
  </script>
</body>
</html>
